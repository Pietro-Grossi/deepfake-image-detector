# =============================================================================
# Baseline CNN custom sul subset misto GenImage (M2).
# Prima di usarlo, generare lo split con:
#   python scripts/build_splits.py --data-root data/genimage_subset \
#       --name baseline_misto --mode mixed \
#       --train-per-class 5000 --val-per-class 1000 --test-per-class 1000
# =============================================================================

experiment:
  name: cnn_baseline_misto
  seed: 42

model:
  name: cnn_custom
  num_classes: 2
  pretrained: false
  dropout: 0.3
  freeze_backbone: false
  backbone_lr_mult: 0.1

data:
  train_csv: splits/baseline_misto/train.csv
  val_csv: splits/baseline_misto/val.csv
  test_csv: splits/baseline_misto/test_in_distribution.csv
  image_size: 224
  num_workers: 8
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

train:
  epochs: 20
  batch_size: 128
  lr: 0.001
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
  amp: true
  early_stopping_patience: 5
  monitor: val_f1
