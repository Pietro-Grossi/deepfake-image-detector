# =============================================================================
# Swin-Tiny pretrained su split cross-generator:
# training/validation su 7 generatori, test su SDv5.
# =============================================================================

experiment:
  name: swin_tiny_crossgen_7gen_test_sdv5
  seed: 42

model:
  name: swin_tiny
  num_classes: 2
  pretrained: true
  dropout: 0.2
  # true = allena solo la testa finale; false = fine-tuning completo
  freeze_backbone: false
  backbone_lr_mult: 0.1

data:
  train_csv: splits/crossgen_7gen_test_sdv5/train.csv
  val_csv: splits/crossgen_7gen_test_sdv5/val.csv
  test_csv: splits/crossgen_7gen_test_sdv5/test_in_distribution.csv
  image_size: 224
  num_workers: 8
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

train:
  epochs: 20
  batch_size: 32
  lr: 0.0001
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
  amp: true
  early_stopping_patience: 5
  monitor: val_f1
